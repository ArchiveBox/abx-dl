name: Build Docker image

on:
  workflow_call:
    inputs:
      push_digests:
        description: Push the tested single-platform images by digest for release
        required: false
        default: false
        type: boolean

env:
  DOCKERHUB_IMAGE: archivebox/abx-dl
  GHCR_IMAGE: ghcr.io/archivebox/abx-dl

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  build:
    name: build and test ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            cache_scope: docker-amd64
            artifact_name: digest-linux-amd64
            local_tag: archivebox/abx-dl:test-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_scope: docker-arm64
            artifact_name: digest-linux-arm64
            local_tag: archivebox/abx-dl:test-arm64

    steps:
      - name: Checkout abx-dl
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone build contexts
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t versions < <("$PYTHON_BINARY" - <<'PY'
          import re
          import tomllib

          dependencies = tomllib.load(open("pyproject.toml", "rb"))["project"]["dependencies"]
          for package in ("abxbus", "abxpkg", "abx-plugins"):
              match = next(
                  (
                      re.fullmatch(rf"{re.escape(package)}==([^; ]+)", dependency)
                      for dependency in dependencies
                      if dependency.startswith(f"{package}==")
                  ),
                  None,
              )
              if match is None:
                  raise SystemExit(f"Missing exact {package} dependency")
              print(match.group(1))
          PY
          )
          test "${#versions[@]}" -eq 3
          for context in \
            "abxbus|${versions[0]}|https://github.com/ArchiveBox/abxbus.git" \
            "abxpkg|v${versions[1]}|https://github.com/ArchiveBox/abxpkg.git" \
            "abx-plugins|v${versions[2]}|https://github.com/ArchiveBox/abx-plugins.git"
          do
            IFS='|' read -r name tag url <<< "$context"
            remote_ref="$("${GIT_BINARY}" ls-remote "$url" "refs/tags/$tag")"
            remote_sha="${remote_ref%%[[:space:]]*}"
            [[ "$remote_sha" =~ ^[0-9a-f]{40}$ ]]
            checkout="${{ runner.temp }}/$name"
            "${GIT_BINARY}" clone --depth=1 --branch "$tag" "$url" "$checkout"
            test "$("${GIT_BINARY}" -C "$checkout" rev-parse HEAD)" = "$remote_sha"
          done

      - name: Install documentation test dependencies
        run: $UV_BINARY sync --locked --group dev --no-sources

      - name: Resolve Docker through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" run --no-project python bin/ci_project_tools.py docker_binaries --lib "$ABXPKG_LIB_DIR"
          docker_binary="$ABXPKG_LIB_DIR/env/bin/docker"
          test -L "$docker_binary"
          test -x "$docker_binary"
          "$docker_binary" --version

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.2

      - name: Available platforms
        run: echo '${{ steps.buildx.outputs.platforms }}'

      - name: Collect Docker metadata
        id: docker_meta
        shell: bash
        run: |
          set -Eeuo pipefail
          VERSION="$("${UV_BINARY}" run --no-sync python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          BRANCH_TAG="$(GITHUB_REF_NAME="$GITHUB_REF_NAME" "$UV_BINARY" run --no-project python - <<'PY'
          import os
          import re

          print(re.sub(r"-+", "-", re.sub(r"[^A-Za-z0-9_.-]", "-", os.environ["GITHUB_REF_NAME"])).strip("-")[:128])
          PY
          )"
          SHORT_SHA="${GITHUB_SHA::12}"
          test -n "$BRANCH_TAG"
          test -n "$SHORT_SHA"

          {
            echo 'labels<<EOF'
            echo "org.opencontainers.image.title=abx-dl"
            echo "org.opencontainers.image.vendor=ArchiveBox"
            echo "org.opencontainers.image.version=${VERSION}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.source=https://github.com/ArchiveBox/abx-dl"
            echo 'EOF'
            echo "version=${VERSION}"
            echo "branch_tag=${BRANCH_TAG}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

          echo "[+] Building ${{ matrix.platform }} for abx-dl ${VERSION} branch=${BRANCH_TAG} sha=${SHORT_SHA}"

      - name: Build local image for smoke test
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          load: true
          tags: ${{ matrix.local_tag }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-contexts: |
            abxbus=${{ runner.temp }}/abxbus
            abxpkg=${{ runner.temp }}/abxpkg
            abx-plugins=${{ runner.temp }}/abx-plugins
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          platforms: ${{ matrix.platform }}

      - name: Test Docker documentation commands
        if: matrix.platform == 'linux/amd64'
        env:
          ABXDL_IMAGE: ${{ matrix.local_tag }}
        run: $UV_BINARY run --no-sync --no-sources pytest -vv --tb=long -m docker_required README.md AGENTS.md CLAUDE.md skills

      - name: Validate real crawl inside Docker image
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        run: |
          set -Eeuo pipefail
          OUT_DIR="${{ runner.temp }}/abx-dl-smoke-${{ matrix.artifact_name }}"
          PERSONAS_DIR="${{ runner.temp }}/abx-dl-personas-${{ matrix.artifact_name }}"
          ALL_PLUGINS_ENV="${{ runner.temp }}/abx-dl-all-plugins-${{ matrix.artifact_name }}.env"
          OUT_DIR="$OUT_DIR" PERSONAS_DIR="$PERSONAS_DIR" "$UV_BINARY" run --no-project python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          for name in ("OUT_DIR", "PERSONAS_DIR"):
              path = Path(os.environ[name])
              shutil.rmtree(path, ignore_errors=True)
              path.mkdir(parents=True)
          PY

          ABX_PLUGINS_DIR="${{ runner.temp }}/abx-plugins/abx_plugins/plugins" \
            ALL_PLUGINS_ENV="$ALL_PLUGINS_ENV" \
            "$UV_BINARY" run --no-sync --no-sources python - <<'PY'
          import os
          from pathlib import Path
          from abx_dl.models import discover_plugins

          plugins = discover_plugins(Path(os.environ["ABX_PLUGINS_DIR"]), runtime="abx-dl")
          enabled_keys = sorted(
              plugin.enabled_key
              for plugin in plugins.values()
              if plugin.filter_hooks("Snapshot") and plugin.enabled_key in plugin.config.properties
          )
          Path(os.environ["ALL_PLUGINS_ENV"]).write_text(
              "".join(f"{enabled_key}=True\n" for enabled_key in enabled_keys),
          )
          print(f"Enabled {len(enabled_keys)} Snapshot plugins: {enabled_keys}")
          PY

          "$SCRIPT_BINARY" -q -e -c \
            "\"${DOCKER_BINARY}\" run --rm -it --platform '${{ matrix.platform }}' --env-file '$ALL_PLUGINS_ENV' --env ABXPKG_LIB_DIR=/tmp/runtime-abx-lib --env ANTHROPIC_API_KEY --env CLAUDE_CODE_OAUTH_TOKEN --env TWOCAPTCHA_API_KEY --volume '$OUT_DIR:/out' --volume '$PERSONAS_DIR:/data/personas' '${{ matrix.local_tag }}' --max-urls=1 https://example.com" \
            /dev/null 2>&1 | "$TEE_BINARY" "$OUT_DIR/crawl.log"

          "$SCRIPT_BINARY" -q -e -c \
            "\"${DOCKER_BINARY}\" run --rm -it --platform '${{ matrix.platform }}' --volume '$OUT_DIR:/out' --volume '$PERSONAS_DIR:/data/personas' --entrypoint bash '${{ matrix.local_tag }}' -lc 'set -Eeuo pipefail; test \"\$PWD\" = /out; test -d /data/personas; test ! -e /out/personas; ! command -v sonic; ! command -v cargo; ! command -v gcc; ! command -v g++; ! command -v make'" \
            /dev/null

          "${UV_BINARY}" run --no-sync --no-sources python bin/validate_crawl.py \
            "$OUT_DIR/index.jsonl" \
            --output-dir="$OUT_DIR" \
            --plugins-dir="${{ runner.temp }}/abx-plugins/abx_plugins/plugins"

          test -s "$OUT_DIR/title/title.txt"
          test -s "$OUT_DIR/wget/example.com/index.html"
          OUT_DIR="$OUT_DIR" "$UV_BINARY" run --no-project python - <<'PY'
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUT_DIR"])
          title = (output_dir / "title" / "title.txt").read_text()
          downloaded_html = (output_dir / "wget" / "example.com" / "index.html").read_text()
          if title.strip() != "Example Domain":
              raise SystemExit(f"Unexpected title output: {title!r}")
          for expected in ("Example Domain", "This domain is for use"):
              if expected not in downloaded_html:
                  raise SystemExit(f"Downloaded HTML is missing {expected!r}")
          PY

      - name: Validate image version and commit
        shell: bash
        run: |
          set -Eeuo pipefail
          VERSION_OUTPUT="$("${DOCKER_BINARY}" run --rm --platform '${{ matrix.platform }}' --entrypoint abx-dl '${{ matrix.local_tag }}' --version)"
          printf '%s\n' "$VERSION_OUTPUT"
          test "$VERSION_OUTPUT" = "${{ steps.docker_meta.outputs.version }}"

          "${DOCKER_BINARY}" run --rm --platform '${{ matrix.platform }}' --entrypoint bash '${{ matrix.local_tag }}' -lc \
            '/venv/bin/python -c '\''import pathlib, sys; expected = "COMMIT_HASH='"${GITHUB_SHA}"'"; sys.exit(expected not in pathlib.Path("/VERSION.txt").read_text().splitlines())'\'''

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: inputs.push_digests
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: inputs.push_digests
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the exact tested image by digest
        id: push_tested
        if: inputs.push_digests
        shell: bash
        run: |
          set -Eeuo pipefail
          TEMP_TAG="sha-${{ steps.docker_meta.outputs.short_sha }}-${{ matrix.artifact_name }}"
          DOCKERHUB_REF="${DOCKERHUB_IMAGE}:${TEMP_TAG}"
          GHCR_REF="${GHCR_IMAGE}:${TEMP_TAG}"

          "${DOCKER_BINARY}" image tag "${{ matrix.local_tag }}" "$DOCKERHUB_REF"
          "${DOCKER_BINARY}" image tag "${{ matrix.local_tag }}" "$GHCR_REF"
          DOCKERHUB_PUSH_OUTPUT="$("${DOCKER_BINARY}" image push "$DOCKERHUB_REF")"
          printf '%s\n' "$DOCKERHUB_PUSH_OUTPUT"
          [[ "$DOCKERHUB_PUSH_OUTPUT" =~ digest:[[:space:]](sha256:[0-9a-f]{64})[[:space:]]size: ]]
          DOCKERHUB_DIGEST="${BASH_REMATCH[1]}"

          GHCR_PUSH_OUTPUT="$("${DOCKER_BINARY}" image push "$GHCR_REF")"
          printf '%s\n' "$GHCR_PUSH_OUTPUT"
          [[ "$GHCR_PUSH_OUTPUT" =~ digest:[[:space:]](sha256:[0-9a-f]{64})[[:space:]]size: ]]
          GHCR_DIGEST="${BASH_REMATCH[1]}"

          test "$DOCKERHUB_DIGEST" = "$GHCR_DIGEST"
          echo "digest=$DOCKERHUB_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Export digest
        if: inputs.push_digests
        shell: bash
        run: |
          set -Eeuo pipefail
          digest="${{ steps.push_tested.outputs.digest }}"
          test -n "$digest"
          DIGEST="${digest#sha256:}" "$UV_BINARY" run --no-project python - <<'PY'
          import os
          from pathlib import Path

          digest_dir = Path("/tmp/digests")
          digest_dir.mkdir(parents=True, exist_ok=True)
          (digest_dir / os.environ["DIGEST"]).touch()
          PY

      - name: Upload digest
        if: inputs.push_digests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 90
