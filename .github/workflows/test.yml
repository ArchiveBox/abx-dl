name: Full test suite

on:
  workflow_call:

env:
  PYTHONIOENCODING: utf-8
  USE_COLOR: "False"
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          PYTHON_BINARY: ${{ env.pythonLocation }}/bin/python
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install Python dependencies
        run: '"${UV_BINARY}" sync --locked --dev --no-sources'

      - name: Run prek
        run: $UV_BINARY run --no-sync --no-sources prek run --all-files

  discover-tests:
    name: Discover test files
    runs-on: ubuntu-24.04
    outputs:
      tests: ${{ steps.matrix.outputs.tests }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Build test matrix
        id: matrix
        run: |
          uv run --no-project python - <<'PY'
          import json
          import os
          from pathlib import Path

          cells = (
              ("ubuntu-24.04", "3.12"),
              ("ubuntu-24.04", "3.13"),
              ("ubuntu-24.04", "3.14"),
              ("macos-15", "3.12"),
              ("macos-15", "3.13"),
              ("macos-15", "3.14"),
          )
          test_files = sorted(
              str(path)
              for root in (Path("tests"), Path("server/tests"))
              for path in root.glob("test_*.py")
          )
          if not test_files:
              raise SystemExit("No test files discovered")

          matrix = []
          for index, test_file in enumerate(test_files):
              os_name, python_version = cells[index % len(cells)]
              matrix.append({"file": test_file, "os": os_name, "python": python_version})
          assigned_files = [entry["file"] for entry in matrix]
          assigned_cells = {(entry["os"], entry["python"]) for entry in matrix}
          if sorted(assigned_files) != test_files or len(assigned_files) != len(set(assigned_files)):
              raise SystemExit("Test matrix must assign every discovered file exactly once")
          if assigned_cells != set(cells):
              raise SystemExit("Test matrix must cover every supported OS/Python cell")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              output.write(f"tests={json.dumps(matrix, separators=(',', ':'))}\n")
          print(json.dumps(matrix, indent=2))
          PY

  unit-tests:
    name: ${{ matrix.file }} (${{ matrix.os }}, Python ${{ matrix.python }})
    needs: discover-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-tests.outputs.tests) }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          PYTHON_BINARY: ${{ env.pythonLocation }}/bin/python
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install Python dependencies
        run: '"${UV_BINARY}" sync --locked --dev --no-sources'

      - name: Run repo test suite
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/runtime-abx-lib
        run: $UV_BINARY run --no-sync --no-sources pytest -q "${{ matrix.file }}"

  documentation:
    name: Documentation code blocks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          PYTHON_BINARY: ${{ env.pythonLocation }}/bin/python
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install Python dependencies
        run: '"${UV_BINARY}" sync --locked --dev --no-sources'

      - name: Run documentation code blocks
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/runtime-abx-lib
        run: $UV_BINARY run --no-sync --no-sources pytest -vv --tb=long --durations=0 -m "not docker_required" README.md AGENTS.md CLAUDE.md skills

  test-all:
    name: All plugins
    runs-on: ubuntu-24.04
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          PYTHON_BINARY: ${{ env.pythonLocation }}/bin/python
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install Python dependencies
        run: '"${UV_BINARY}" sync --locked --dev --no-sources'

      - name: Locate installed ArchiveBox plugins
        run: |
          plugins_dir="$("${UV_BINARY}" run --no-sync --no-sources python -c 'from abx_plugins import get_plugins_dir; print(get_plugins_dir())')"
          test -d "$plugins_dir"
          echo "ABX_PLUGINS_DIR=$plugins_dir" >> "$GITHUB_ENV"

      - name: Enable every Snapshot plugin
        run: |
          set -Eeuo pipefail
          "$UV_BINARY" run --no-sync --no-sources python - <<'PY'
          import os
          from pathlib import Path
          from abx_dl.models import discover_plugins

          plugins = discover_plugins(Path(os.environ["ABX_PLUGINS_DIR"]), runtime="abx-dl")
          enabled_keys = sorted(
              plugin.enabled_key
              for plugin in plugins.values()
              if plugin.filter_hooks("Snapshot") and plugin.enabled_key in plugin.config.properties
          )
          with Path(os.environ["GITHUB_ENV"]).open("a") as output:
              for enabled_key in enabled_keys:
                  output.write(f"{enabled_key}=True\n")
          print(f"Enabled {len(enabled_keys)} Snapshot plugins: {enabled_keys}")
          PY

      - name: Test all plugins
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" run --no-sync --no-sources abx-dl dl 'https://example.com' --dir=./test-output --max-urls=2
          "${UV_BINARY}" run --no-sync --no-sources python bin/validate_crawl.py \
            ./test-output/index.jsonl \
            --output-dir=./test-output \
            --plugins-dir="$ABX_PLUGINS_DIR"
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/runtime-abx-lib
          PERSONAS_DIR: ${{ runner.temp }}/abx-personas
          CHROME_USER_DATA_DIR: ${{ runner.temp }}/abx-personas/Default/chrome_profile

      - name: Upload test output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-output
          path: ./test-output/
          retention-days: 7

  package-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          PYTHON_BINARY: ${{ env.pythonLocation }}/bin/python
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install build and test dependencies
        run: $UV_BINARY sync --locked --dev --no-sources

      - name: Build wheel and source distribution once
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" build --out-dir=dist
          "${UV_BINARY}" run --no-sync --no-sources python - <<'PY'
          import hashlib
          from pathlib import Path

          artifacts = sorted(Path("dist").iterdir())
          wheels = [path for path in artifacts if path.suffix == ".whl"]
          sdists = [path for path in artifacts if path.name.endswith(".tar.gz")]
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(f"Expected one wheel and one sdist, got: {artifacts}")
          checksums = [f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}" for path in (*wheels, *sdists)]
          Path("dist/SHA256SUMS").write_text("\n".join(checksums) + "\n")
          print("\n".join(checksums))
          PY

      - name: Upload the exact tested distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 90

  package-artifact-smoke:
    name: Test release artifacts (Python ${{ matrix.python }})
    needs: package-artifacts
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          PYTHON_BINARY: ${{ env.pythonLocation }}/bin/python
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Download the exact release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-dist-${{ github.sha }}
          path: dist

      - name: Install and smoke-test the exact wheel and sdist
        run: |
          set -Eeuo pipefail
          VERSION="$("${UV_BINARY}" run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          for artifact in dist/*.whl dist/*.tar.gz; do
            test "$("${UV_BINARY}" run --isolated --no-project --python '${{ matrix.python }}' --with "$artifact" abx-dl version --quiet)" = "$VERSION"
            "${UV_BINARY}" run --isolated --no-project --python '${{ matrix.python }}' --with "$artifact" abx-dl --help > /dev/null
          done
