name: Parallel Plugin Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8
  USE_COLOR: "False"
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abx-pkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-pkg.git "${{ runner.temp }}/abx-pkg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
        run: |
          uv sync --no-sources --extra dev
          uv pip install -e "${{ runner.temp }}/abx-pkg" -e "${{ runner.temp }}/abx-plugins[dev]"

      - name: Run prek
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
        run: uv run --no-sync --no-sources prek run --all-files

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abx-pkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-pkg.git "${{ runner.temp }}/abx-pkg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
        run: |
          uv sync --no-sources --extra dev
          uv pip install -e "${{ runner.temp }}/abx-pkg" -e "${{ runner.temp }}/abx-plugins[dev]"

      - name: Run repo test suite
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
        run: uv run --no-sync --no-sources pytest -q tests server/tests

  discover-plugins:
    name: Discover plugins
    runs-on: ubuntu-24.04
    needs: prek
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Discover plugins
        id: set-matrix
        run: |
          plugins_json="["
          first=true
          for plugin_dir in $(find "${{ runner.temp }}/abx-plugins/abx_plugins/plugins" -maxdepth 1 -mindepth 1 -type d ! -name '__*' ! -name '.*' | sort); do
            if [ ! -d "$plugin_dir/tests" ]; then
              continue
            fi

            plugin_name=$(basename "$plugin_dir")
            needs_chromium=false
            if grep -Riq "chrom" "$plugin_dir"; then
              needs_chromium=true
            fi

            if [ "$first" = true ]; then
              first=false
            else
              plugins_json+=","
            fi

            plugins_json+="{\"name\":\"$plugin_name\",\"path\":\"$plugin_dir\",\"needs_chromium\":$needs_chromium}"
          done
          plugins_json+="]"

          echo "plugins=$plugins_json" >> $GITHUB_OUTPUT
          echo "Found plugins:"
          echo "$plugins_json" | jq '.'

  test-plugin:
    name: ${{ matrix.plugin.name }}
    runs-on: ubuntu-24.04
    needs: discover-plugins
    if: ${{ needs.discover-plugins.outputs.plugins != '[]' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDECODEEXTRACT_MODEL: sonnet
      CLAUDECODEEXTRACT_MAX_TURNS: "10"
      CLAUDECODEEXTRACT_TIMEOUT: "120"
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abx-pkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-pkg.git "${{ runner.temp }}/abx-pkg"

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
        run: |
          uv sync --no-sources --extra dev
          uv pip install -e "${{ runner.temp }}/abx-pkg" -e "${{ runner.temp }}/abx-plugins[dev]"

      - name: Verify Chromium launch
        if: ${{ matrix.plugin.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Test plugin - ${{ matrix.plugin.name }}
        run: |
          plugin_tests="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/tests"
          attempts=0
          max_attempts=3

          while true; do
            attempts=$((attempts + 1))
            set +e
            uv run --no-sync --no-sources pytest -q "$plugin_tests"
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$status" -eq 5 ]; then
              echo "No tests collected for ${{ matrix.plugin.name }}; treating as pass."
              exit 0
            fi

            if [ "$attempts" -ge "$max_attempts" ]; then
              exit "$status"
            fi

            echo "Plugin tests failed for ${{ matrix.plugin.name }} with exit code $status. Retrying ($attempts/$max_attempts)..."
            sleep 10
          done
        env:
          CHROME_SANDBOX: "false"
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
          TIMEOUT: "120"

  test-all:
    name: All plugins
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abx-pkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-pkg.git "${{ runner.temp }}/abx-pkg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
        run: |
          uv sync --no-sources --extra dev
          uv pip install -e "${{ runner.temp }}/abx-pkg" -e "${{ runner.temp }}/abx-plugins[dev]"

      - name: Verify Chromium launch
        uses: ./.github/actions/verify-chromium-launch

      - name: Test all plugins
        run: |
          uv run --no-sync --no-sources abx-dl dl 'https://example.com' --dir=./test-output --timeout=120

          echo "=== Output structure ==="
          find ./test-output -type f | head -50

          echo "=== Results ==="
          cat ./test-output/index.json | jq '.'
        env:
          ABX_PLUGINS_DIR: ${{ runner.temp }}/abx-plugins/abx_plugins/plugins
          CHROME_SANDBOX: "false"
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abx-pkg
          TIMEOUT: "120"

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: ./test-output/
          retention-days: 7
