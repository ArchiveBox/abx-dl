name: Parallel Plugin Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONIOENCODING: utf-8
  USE_COLOR: "False"
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abxpkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: |
          uv venv
          uv pip install --group dev -e "${{ runner.temp }}/abxpkg" -e "${{ runner.temp }}/abx-plugins" -e .

      - name: Run prek
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: uv run --no-sync --no-sources prek run --all-files

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abxpkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: |
          uv venv
          uv pip install --group dev -e "${{ runner.temp }}/abxpkg" -e "${{ runner.temp }}/abx-plugins" -e .

      - name: Run repo test suite
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: uv run --no-sync --no-sources pytest -q tests server/tests

      - name: Run documentation code blocks
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: uv run --no-sync --no-sources pytest -vv --tb=long --durations=0 -m "not docker_required" README.md AGENTS.md skills

  discover-plugins:
    name: Discover plugins
    runs-on: ubuntu-24.04
    needs: prek
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Discover plugins
        id: set-matrix
        run: |
          plugins_json="["
          first=true
          for plugin_dir in $(find "${{ runner.temp }}/abx-plugins/abx_plugins/plugins" -maxdepth 1 -mindepth 1 -type d ! -name '__*' ! -name '.*' | sort); do
            if [ ! -d "$plugin_dir/tests" ]; then
              continue
            fi

            plugin_name=$(basename "$plugin_dir")
            needs_chromium=false
            if grep -Riq "chrom" "$plugin_dir"; then
              needs_chromium=true
            fi

            if [ "$first" = true ]; then
              first=false
            else
              plugins_json+=","
            fi

            plugins_json+="{\"name\":\"$plugin_name\",\"path\":\"$plugin_dir\",\"needs_chromium\":$needs_chromium}"
          done
          plugins_json+="]"

          echo "plugins=$plugins_json" >> $GITHUB_OUTPUT
          echo "Found plugins:"
          echo "$plugins_json" | jq '.'

  test-plugin:
    name: ${{ matrix.plugin.name }}
    runs-on: ubuntu-24.04
    needs: discover-plugins
    if: ${{ needs.discover-plugins.outputs.plugins != '[]' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDECODEEXTRACT_MODEL: sonnet
      CLAUDECODEEXTRACT_MAX_TURNS: "10"
      CLAUDECODEEXTRACT_TIMEOUT: "120"
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abxpkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: |
          uv venv
          uv pip install --group dev -e "${{ runner.temp }}/abxpkg" -e "${{ runner.temp }}/abx-plugins" -e .

      - name: Select Chromium for extension-capable CDP
        if: ${{ matrix.plugin.needs_chromium }}
        env:
          MIN_CHROMIUM_MAJOR: "149"
          LIB_DIR: ${{ runner.temp }}/abx-lib
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          mkdir -p "$LIB_DIR"
          echo "LIB_DIR=$LIB_DIR" >> "$GITHUB_ENV"
          echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR" >> "$GITHUB_ENV"

          candidate="/usr/bin/chromium"
          version=""
          major=0
          if [ -x "$candidate" ]; then
            version="$("$candidate" --version || true)"
            major="$(printf '%s\n' "$version" | sed -E 's/.* ([0-9]+)\..*/\1/' | head -1)"
            case "$major" in
              ''|*[!0-9]*) major=0 ;;
            esac
          fi

          if [ "$major" -ge "$MIN_CHROMIUM_MAJOR" ]; then
            echo "Using runner Chromium: $candidate ($version)"
            echo "CHROME_BINARY=$candidate" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Runner Chromium is unavailable or too old: ${version:-not found}"
          echo "Installing Playwright Chromium into $LIB_DIR..."
          uv run --no-sync --no-sources abxpkg install \
            --binproviders=npm \
            --lib="$LIB_DIR" \
            --postinstall-scripts=false \
            --min-release-age=0 \
            --no-cache \
            --overrides='{"npm":{"install_args":["playwright@next"]}}' \
            playwright
          uv run --no-sync --no-sources abxpkg install \
            --binproviders=playwright \
            --lib="$LIB_DIR" \
            --bin-dir="$LIB_DIR/env/bin" \
            --min-version="$MIN_CHROMIUM_MAJOR" \
            chromium

          candidate="$LIB_DIR/env/bin/chromium"
          if [ ! -x "$candidate" ]; then
            echo "Playwright Chromium shim was not created at $candidate" >&2
            exit 1
          fi
          version="$("$candidate" --version || true)"
          major="$(printf '%s\n' "$version" | sed -E 's/.* ([0-9]+)\..*/\1/' | head -1)"
          case "$major" in
            ''|*[!0-9]*) major=0 ;;
          esac
          if [ "$major" -lt "$MIN_CHROMIUM_MAJOR" ]; then
            echo "Playwright Chromium is still too old: ${version:-unknown}" >&2
            exit 1
          fi
          echo "Using Playwright Chromium: $candidate ($version)"
          echo "CHROME_BINARY=$candidate" >> "$GITHUB_ENV"

      - name: Verify Chromium launch
        if: ${{ matrix.plugin.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Test plugin - ${{ matrix.plugin.name }}
        run: |
          plugin_tests="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/tests"
          uv run --no-sync --no-sources pytest -q "$plugin_tests"
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
          TIMEOUT: "120"

  test-all:
    name: All plugins
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Clone abxpkg
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
        run: |
          uv venv
          uv pip install --group dev -e "${{ runner.temp }}/abxpkg" -e "${{ runner.temp }}/abx-plugins" -e .

      - name: Select Chromium for extension-capable CDP
        env:
          MIN_CHROMIUM_MAJOR: "149"
          LIB_DIR: ${{ runner.temp }}/abx-lib
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          mkdir -p "$LIB_DIR"
          echo "LIB_DIR=$LIB_DIR" >> "$GITHUB_ENV"
          echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR" >> "$GITHUB_ENV"

          candidate="/usr/bin/chromium"
          version=""
          major=0
          if [ -x "$candidate" ]; then
            version="$("$candidate" --version || true)"
            major="$(printf '%s\n' "$version" | sed -E 's/.* ([0-9]+)\..*/\1/' | head -1)"
            case "$major" in
              ''|*[!0-9]*) major=0 ;;
            esac
          fi

          if [ "$major" -ge "$MIN_CHROMIUM_MAJOR" ]; then
            echo "Using runner Chromium: $candidate ($version)"
            echo "CHROME_BINARY=$candidate" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Runner Chromium is unavailable or too old: ${version:-not found}"
          echo "Installing Playwright Chromium into $LIB_DIR..."
          uv run --no-sync --no-sources abxpkg install \
            --binproviders=npm \
            --lib="$LIB_DIR" \
            --postinstall-scripts=false \
            --min-release-age=0 \
            --no-cache \
            --overrides='{"npm":{"install_args":["playwright@next"]}}' \
            playwright
          uv run --no-sync --no-sources abxpkg install \
            --binproviders=playwright \
            --lib="$LIB_DIR" \
            --bin-dir="$LIB_DIR/env/bin" \
            --min-version="$MIN_CHROMIUM_MAJOR" \
            chromium

          candidate="$LIB_DIR/env/bin/chromium"
          if [ ! -x "$candidate" ]; then
            echo "Playwright Chromium shim was not created at $candidate" >&2
            exit 1
          fi
          version="$("$candidate" --version || true)"
          major="$(printf '%s\n' "$version" | sed -E 's/.* ([0-9]+)\..*/\1/' | head -1)"
          case "$major" in
            ''|*[!0-9]*) major=0 ;;
          esac
          if [ "$major" -lt "$MIN_CHROMIUM_MAJOR" ]; then
            echo "Playwright Chromium is still too old: ${version:-unknown}" >&2
            exit 1
          fi
          echo "Using Playwright Chromium: $candidate ($version)"
          echo "CHROME_BINARY=$candidate" >> "$GITHUB_ENV"

      - name: Verify Chromium launch
        uses: ./.github/actions/verify-chromium-launch

      - name: Test all plugins
        run: |
          uv run --no-sync --no-sources abx-dl dl 'https://example.com' --dir=./test-output --timeout=120 --max-urls=2 --plugins=wget,parse_html_urls

          echo "=== Output structure ==="
          find ./test-output -type f | head -50

          echo "=== Results ==="
          grep '^{' ./test-output/index.jsonl | jq -s '.'
        env:
          ABX_PLUGINS_DIR: ${{ runner.temp }}/abx-plugins/abx_plugins/plugins
          PERSONAS_DIR: ${{ runner.temp }}/abx-personas
          CHROME_USER_DATA_DIR: ${{ runner.temp }}/abx-personas/Default/chrome_profile
          PYTHONPATH: ${{ runner.temp }}/abx-plugins:${{ runner.temp }}/abxpkg
          TIMEOUT: "120"

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: ./test-output/
          retention-days: 7
