name: Parallel Plugin Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONIOENCODING: utf-8
  USE_COLOR: "False"
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 --branch v1.11.293 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Install Python dependencies
        run: |
          uv sync --locked --dev --no-sources
          uv pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Run prek
        run: uv run --no-sync --no-sources prek run --all-files

  unit-tests:
    name: Unit tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python: ["3.12.13", "3.13.14", "3.14.6"]

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 --branch v1.11.293 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Install Python dependencies
        run: |
          uv sync --locked --dev --no-sources
          uv pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Select system dependencies
        shell: bash
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          mkdir -p "$ABXPKG_LIB_DIR"
          uv run --no-sync --no-sources abxpkg env \
            --install \
            --json \
            --binproviders=env,apt,brew \
            --lib="$ABXPKG_LIB_DIR" \
            wget curl git rg \
            | jq -r 'to_entries[] | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"

      - name: Run repo test suite
        run: uv run --no-sync --no-sources pytest -q tests server/tests

      - name: Run documentation code blocks
        run: uv run --no-sync --no-sources pytest -vv --tb=long --durations=0 -m "not docker_required" README.md AGENTS.md skills

  discover-plugins:
    name: Discover plugins
    runs-on: ubuntu-24.04
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 --branch v1.11.293 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Discover plugins
        id: set-matrix
        run: |
          set -Eeuo pipefail
          plugins_json="$(
            find "${{ runner.temp }}/abx-plugins/abx_plugins/plugins" -maxdepth 1 -mindepth 1 -type d ! -name '__*' ! -name '.*' -print0 \
              | sort -z \
              | while IFS= read -r -d '' plugin_dir; do
                  [[ -d "$plugin_dir/tests" ]] || continue
                  plugin_name="$(basename "$plugin_dir")"
                  needs_chromium=false
                  if grep -Riq "chrom" "$plugin_dir"; then
                    needs_chromium=true
                  fi
                  jq -cn \
                    --arg name "$plugin_name" \
                    --arg path "$plugin_dir" \
                    --argjson needs_chromium "$needs_chromium" \
                    '{name: $name, path: $path, needs_chromium: $needs_chromium}'
                done \
              | jq -sc .
          )"

          test "$plugins_json" != "[]"

          echo "plugins=$plugins_json" >> "$GITHUB_OUTPUT"
          echo "Found plugins:"
          echo "$plugins_json" | jq '.'

  test-plugin:
    name: ${{ matrix.plugin.name }}
    runs-on: ubuntu-24.04
    needs: discover-plugins
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDECODEEXTRACT_MODEL: sonnet
      CLAUDECODEEXTRACT_MAX_TURNS: "10"
      CLAUDECODEEXTRACT_TIMEOUT: "120"
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 --branch v1.11.293 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"

      - name: Install Python dependencies
        run: |
          uv sync --locked --dev --no-sources
          uv pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Select system dependencies
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          mkdir -p "$ABXPKG_LIB_DIR"
          uv run --no-sync --no-sources abxpkg env \
            --install \
            --json \
            --binproviders=env,apt \
            --lib="$ABXPKG_LIB_DIR" \
            wget curl git rg \
            | jq -r 'to_entries[] | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"

      - name: Select Chromium for extension-capable CDP
        if: ${{ matrix.plugin.needs_chromium }}
        env:
          LIB_DIR: ${{ runner.temp }}/abx-lib
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          mkdir -p "$LIB_DIR"
          {
            echo "LIB_DIR=$LIB_DIR"
            echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR"
            uv run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$LIB_DIR" \
              --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/chrome/config.json:required_binaries" \
              --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/config.json:required_binaries" \
              | jq -r 'to_entries[] | "\(.key)=\(.value)"'
          } >> "$GITHUB_ENV"

      - name: Verify Chromium launch
        if: ${{ matrix.plugin.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Test plugin - ${{ matrix.plugin.name }}
        run: |
          plugin_tests="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/tests"
          uv run --no-sync --no-sources pytest -q "$plugin_tests"
        env:
          TIMEOUT: "120"

  test-all:
    name: All plugins
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          git clone --depth=1 --branch v1.11.293 https://github.com/ArchiveBox/abx-plugins.git "${{ runner.temp }}/abx-plugins"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"

      - name: Install Python dependencies
        run: |
          uv sync --locked --dev --no-sources
          uv pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Select system dependencies
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          mkdir -p "$ABXPKG_LIB_DIR"
          uv run --no-sync --no-sources abxpkg env \
            --install \
            --json \
            --binproviders=env,apt \
            --lib="$ABXPKG_LIB_DIR" \
            wget curl git rg \
            | jq -r 'to_entries[] | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"

      - name: Select Chromium for extension-capable CDP
        env:
          LIB_DIR: ${{ runner.temp }}/abx-lib
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          mkdir -p "$LIB_DIR"
          {
            echo "LIB_DIR=$LIB_DIR"
            echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR"
            uv run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$LIB_DIR" \
              --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/chrome/config.json:required_binaries" \
              | jq -r 'to_entries[] | "\(.key)=\(.value)"'
          } >> "$GITHUB_ENV"

      - name: Verify Chromium launch
        uses: ./.github/actions/verify-chromium-launch

      - name: Test all plugins
        run: |
          uv run --no-sync --no-sources abx-dl dl 'https://example.com' --dir=./test-output --timeout=120 --max-urls=2 --plugins=wget,parse_html_urls

          echo "=== Output structure ==="
          find ./test-output -type f | head -50

          echo "=== Results ==="
          grep '^{' ./test-output/index.jsonl | jq -s '.'
        env:
          ABX_PLUGINS_DIR: ${{ runner.temp }}/abx-plugins/abx_plugins/plugins
          PERSONAS_DIR: ${{ runner.temp }}/abx-personas
          CHROME_USER_DATA_DIR: ${{ runner.temp }}/abx-personas/Default/chrome_profile
          TIMEOUT: "120"

      - name: Upload test output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-output
          path: ./test-output/
          retention-days: 7
