name: Parallel Plugin Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8
  USE_COLOR: "False"

jobs:
  discover-plugins:
    name: Discover plugins
    runs-on: ubuntu-24.04
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          rm -rf abx-plugins
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git abx-plugins

      - name: Discover plugins
        id: set-matrix
        run: |
          chrome_test_pattern='ensure_chrome_test_prereqs|ensure_chromium_and_puppeteer_installed|require_chrome_runtime|chrome_session\(|CHROME_NAVIGATE_HOOK'
          # Find all plugin directories
          plugins=$(find abx-plugins/abx_plugins/plugins -maxdepth 1 -mindepth 1 -type d ! -name '__*' ! -name '.*' | sort)

          # Create JSON array with plugin info
          json_array="["
          first=true
          for plugin_dir in $plugins; do
            plugin_name=$(basename "$plugin_dir")

            # Only schedule plugin jobs for snapshot plugins that actually ship tests
            if ls "$plugin_dir"/on_Snapshot* 1> /dev/null 2>&1 && [ -d "$plugin_dir/tests" ]; then
              needs_chromium=false
              if rg -q "$chrome_test_pattern" "$plugin_dir/tests"; then
                needs_chromium=true
              fi
              if [ "$first" = true ]; then
                first=false
              else
                json_array+=","
              fi
              json_array+="{\"name\":\"$plugin_name\",\"path\":\"$plugin_dir\",\"needs_chromium\":$needs_chromium}"
            fi
          done
          json_array+="]"

          echo "plugins=$json_array" >> $GITHUB_OUTPUT
          echo "Found plugins:"
          echo "$json_array" | jq '.'

  test-plugin:
    name: ${{ matrix.plugin.name }}
    runs-on: ubuntu-24.04
    needs: discover-plugins
    if: ${{ needs.discover-plugins.outputs.plugins != '[]' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          rm -rf abx-plugins
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git abx-plugins

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        run: |
          uv sync --extra dev
          uv pip install -e ./abx-plugins

      - name: Verify Chromium launch
        if: ${{ matrix.plugin.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Test plugin - ${{ matrix.plugin.name }}
        run: |
          uv run pytest -q ./abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/tests
        env:
          CHROME_SANDBOX: "false"
          TIMEOUT: "120"

  test-all:
    name: All plugins
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone ArchiveBox plugins
        run: |
          rm -rf abx-plugins
          git clone --depth=1 https://github.com/ArchiveBox/abx-plugins.git abx-plugins

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wget curl git ripgrep
          version: 1.0

      - name: Install Python dependencies
        run: |
          uv sync --extra dev
          uv pip install -e ./abx-plugins

      - name: Verify Chromium launch
        uses: ./.github/actions/verify-chromium-launch

      - name: Test all plugins
        run: |
          uv run abx-dl dl 'https://example.com' --output=./test-output --timeout=120

          echo "=== Output structure ==="
          find ./test-output -type f | head -50

          echo "=== Results ==="
          cat ./test-output/index.json | jq '.'
        env:
          ABX_PLUGINS_DIR: ${{ github.workspace }}/abx-plugins/abx_plugins/plugins
          CHROME_SANDBOX: "false"
          TIMEOUT: "120"

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: ./test-output/
          retention-days: 7
