name: Full test suite

on:
  workflow_call:

env:
  PYTHONIOENCODING: utf-8
  USE_COLOR: "False"
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone ArchiveBox plugins
        run: |
          set -Eeuo pipefail
          plugin_url=https://github.com/ArchiveBox/abx-plugins.git
          plugin_tag=v1.11.311
          expected_sha=a2dfd78d88b01596a5062dac6dd2bea1dc525e69
          remote_ref="$("${GIT_BINARY}" ls-remote "$plugin_url" "refs/tags/$plugin_tag")"
          remote_sha="${remote_ref%%[[:space:]]*}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$remote_sha" = "$expected_sha"
          "${GIT_BINARY}" clone --depth=1 --branch "$plugin_tag" "$plugin_url" "${{ runner.temp }}/abx-plugins"
          test "$("${GIT_BINARY}" -C "${{ runner.temp }}/abx-plugins" rev-parse HEAD)" = "$expected_sha"

      - name: Install Python dependencies
        run: |
          "${UV_BINARY}" sync --locked --dev --no-sources
          "${UV_BINARY}" pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Run prek
        run: $UV_BINARY run --no-sync --no-sources prek run --all-files

  unit-tests:
    name: Unit tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python: "3.12"
          - os: ubuntu-24.04
            python: "3.13"
          - os: ubuntu-24.04
            python: "3.14"
          - os: macos-15
            python: "3.12"
          - os: macos-15
            python: "3.13"
          - os: macos-15
            python: "3.14"

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone ArchiveBox plugins
        run: |
          set -Eeuo pipefail
          plugin_url=https://github.com/ArchiveBox/abx-plugins.git
          plugin_tag=v1.11.311
          expected_sha=a2dfd78d88b01596a5062dac6dd2bea1dc525e69
          remote_ref="$("${GIT_BINARY}" ls-remote "$plugin_url" "refs/tags/$plugin_tag")"
          remote_sha="${remote_ref%%[[:space:]]*}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$remote_sha" = "$expected_sha"
          "${GIT_BINARY}" clone --depth=1 --branch "$plugin_tag" "$plugin_url" "${{ runner.temp }}/abx-plugins"
          test "$("${GIT_BINARY}" -C "${{ runner.temp }}/abx-plugins" rev-parse HEAD)" = "$expected_sha"

      - name: Install Python dependencies
        run: |
          "${UV_BINARY}" sync --locked --dev --no-sources
          "${UV_BINARY}" pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Select system dependencies
        shell: bash
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          export PATH="$ABXPKG_LIB_DIR/env/bin:$PATH"
          "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
            --install \
            --json \
            --binproviders=env,apt,brew \
            --lib="$ABXPKG_LIB_DIR" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/wget/config.json:required_binaries" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/git/config.json:required_binaries" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/search_backend_ripgrep/config.json:required_binaries" \
            curl \
            | "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"

      - name: Run repo test suite
        run: $UV_BINARY run --no-sync --no-sources pytest -q tests server/tests

  documentation:
    name: Documentation code blocks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone ArchiveBox plugins
        run: |
          set -Eeuo pipefail
          plugin_url=https://github.com/ArchiveBox/abx-plugins.git
          plugin_tag=v1.11.311
          expected_sha=a2dfd78d88b01596a5062dac6dd2bea1dc525e69
          remote_ref="$("${GIT_BINARY}" ls-remote "$plugin_url" "refs/tags/$plugin_tag")"
          remote_sha="${remote_ref%%[[:space:]]*}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$remote_sha" = "$expected_sha"
          "${GIT_BINARY}" clone --depth=1 --branch "$plugin_tag" "$plugin_url" "${{ runner.temp }}/abx-plugins"
          test "$("${GIT_BINARY}" -C "${{ runner.temp }}/abx-plugins" rev-parse HEAD)" = "$expected_sha"

      - name: Install Python dependencies
        run: |
          "${UV_BINARY}" sync --locked --dev --no-sources
          "${UV_BINARY}" pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Select system dependencies
        shell: bash
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          export PATH="$ABXPKG_LIB_DIR/env/bin:$PATH"
          "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
            --install \
            --json \
            --binproviders=env,apt \
            --lib="$ABXPKG_LIB_DIR" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/wget/config.json:required_binaries" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/git/config.json:required_binaries" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/search_backend_ripgrep/config.json:required_binaries" \
            curl \
            | "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"

      - name: Run documentation code blocks
        run: $UV_BINARY run --no-sync --no-sources pytest -vv --tb=long --durations=0 -m "not docker_required" README.md AGENTS.md CLAUDE.md skills

  discover-plugins:
    name: Discover plugins
    runs-on: ubuntu-24.04
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone ArchiveBox plugins
        run: |
          set -Eeuo pipefail
          plugin_url=https://github.com/ArchiveBox/abx-plugins.git
          plugin_tag=v1.11.311
          expected_sha=a2dfd78d88b01596a5062dac6dd2bea1dc525e69
          remote_ref="$("${GIT_BINARY}" ls-remote "$plugin_url" "refs/tags/$plugin_tag")"
          remote_sha="${remote_ref%%[[:space:]]*}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$remote_sha" = "$expected_sha"
          "${GIT_BINARY}" clone --depth=1 --branch "$plugin_tag" "$plugin_url" "${{ runner.temp }}/abx-plugins"
          test "$("${GIT_BINARY}" -C "${{ runner.temp }}/abx-plugins" rev-parse HEAD)" = "$expected_sha"

      - name: Discover plugins
        id: set-matrix
        run: |
          set -Eeuo pipefail
          PLUGINS_DIR="${{ runner.temp }}/abx-plugins/abx_plugins/plugins" \
            "$UV_BINARY" run --no-project python - <<'PY'
          import json
          import os
          from pathlib import Path

          plugins_dir = Path(os.environ["PLUGINS_DIR"])
          plugins = []
          for plugin_dir in sorted(plugins_dir.iterdir()):
              if not plugin_dir.is_dir() or plugin_dir.name.startswith((".", "__")):
                  continue
              if not (plugin_dir / "tests").is_dir():
                  continue
              needs_chromium = any(
                  "chrom" in path.read_text(errors="ignore").lower()
                  for path in plugin_dir.rglob("*")
                  if path.is_file()
              )
              plugins.append(
                  {
                      "name": plugin_dir.name,
                      "path": str(plugin_dir),
                      "needs_chromium": needs_chromium,
                  },
              )
          if not plugins:
              raise SystemExit("No plugin test directories discovered")
          plugins_json = json.dumps(plugins, separators=(",", ":"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              output.write(f"plugins={plugins_json}\n")
          print(json.dumps(plugins, indent=2))
          PY

  test-plugin:
    name: ${{ matrix.plugin.name }}
    runs-on: ubuntu-24.04
    needs: discover-plugins
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone ArchiveBox plugins
        run: |
          set -Eeuo pipefail
          plugin_url=https://github.com/ArchiveBox/abx-plugins.git
          plugin_tag=v1.11.311
          expected_sha=a2dfd78d88b01596a5062dac6dd2bea1dc525e69
          remote_ref="$("${GIT_BINARY}" ls-remote "$plugin_url" "refs/tags/$plugin_tag")"
          remote_sha="${remote_ref%%[[:space:]]*}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$remote_sha" = "$expected_sha"
          "${GIT_BINARY}" clone --depth=1 --branch "$plugin_tag" "$plugin_url" "${{ runner.temp }}/abx-plugins"
          test "$("${GIT_BINARY}" -C "${{ runner.temp }}/abx-plugins" rev-parse HEAD)" = "$expected_sha"

      - name: Install Python dependencies
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" sync --locked --dev --no-sources
          "${UV_BINARY}" export --project "${{ runner.temp }}/abx-plugins" --locked --group dev --no-emit-project --no-hashes \
            | "${UV_BINARY}" pip install --requirements -
          "${UV_BINARY}" pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Resolve Node.js through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          export PATH="$ABXPKG_LIB_DIR/env/bin:$PATH"

          tooling_env="$(
            "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$ABXPKG_LIB_DIR" \
              --deps-from="$GITHUB_WORKSPACE/.github/configs/ci-tooling.json:node_binaries"
          )"
          "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            <<< "$tooling_env" >> "$GITHUB_ENV"

          node_binary="$ABXPKG_LIB_DIR/env/bin/node"
          echo "NODE_BINARY=$node_binary" >> "$GITHUB_ENV"
          test -L "$node_binary"
          test -x "$node_binary"
          "$node_binary" --version

      - name: Select system dependencies
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          export PATH="$ABXPKG_LIB_DIR/env/bin:$PATH"
          "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
            --install \
            --json \
            --binproviders=env,apt \
            --lib="$ABXPKG_LIB_DIR" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/wget/config.json:required_binaries" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/git/config.json:required_binaries" \
            --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/search_backend_ripgrep/config.json:required_binaries" \
            curl \
            | "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"

      - name: Select Chromium for extension-capable CDP
        if: ${{ matrix.plugin.needs_chromium }}
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          chromium_env="$(
            "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$ABXPKG_LIB_DIR" \
              --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/chrome/config.json:required_binaries" \
              --deps-from="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/config.json:required_binaries" \
          )"
          "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            <<< "$chromium_env" >> "$GITHUB_ENV"

          chrome_binary="$ABXPKG_LIB_DIR/env/bin/chromium"
          echo "CHROME_BINARY=$chrome_binary" >> "$GITHUB_ENV"
          test -L "$chrome_binary"
          test -x "$chrome_binary"

      - name: Verify Chromium launch
        if: ${{ matrix.plugin.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Test plugin - ${{ matrix.plugin.name }}
        env:
          PYTHONPATH: ${{ runner.temp }}/abx-plugins
        run: |
          plugin_tests="${{ runner.temp }}/abx-plugins/abx_plugins/plugins/${{ matrix.plugin.name }}/tests"
          "${UV_BINARY}" run --no-sync --no-sources pytest \
            -c "${{ runner.temp }}/abx-plugins/pyproject.toml" \
            -q "$plugin_tests"

  test-all:
    name: All plugins
    runs-on: ubuntu-24.04
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone ArchiveBox plugins
        run: |
          set -Eeuo pipefail
          plugin_url=https://github.com/ArchiveBox/abx-plugins.git
          plugin_tag=v1.11.311
          expected_sha=a2dfd78d88b01596a5062dac6dd2bea1dc525e69
          remote_ref="$("${GIT_BINARY}" ls-remote "$plugin_url" "refs/tags/$plugin_tag")"
          remote_sha="${remote_ref%%[[:space:]]*}"
          [[ "$expected_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$remote_sha" = "$expected_sha"
          "${GIT_BINARY}" clone --depth=1 --branch "$plugin_tag" "$plugin_url" "${{ runner.temp }}/abx-plugins"
          test "$("${GIT_BINARY}" -C "${{ runner.temp }}/abx-plugins" rev-parse HEAD)" = "$expected_sha"

      - name: Install Python dependencies
        run: |
          "${UV_BINARY}" sync --locked --dev --no-sources
          "${UV_BINARY}" pip install --no-deps -e "${{ runner.temp }}/abx-plugins"

      - name: Enable every Snapshot plugin and resolve all dependencies through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
          ABX_PLUGINS_DIR: ${{ runner.temp }}/abx-plugins/abx_plugins/plugins
        run: |
          set -Eeuo pipefail
          export PATH="$ABXPKG_LIB_DIR/env/bin:$PATH"
          mapfile -t SNAPSHOT_CONFIGS < <(
            "$UV_BINARY" run --no-sync --no-sources python - <<'PY'
          import os
          from pathlib import Path
          from abx_dl.models import discover_plugins

          plugins = discover_plugins(Path(os.environ["ABX_PLUGINS_DIR"]), runtime="abx-dl")
          for plugin in plugins.values():
              if plugin.filter_hooks("Snapshot"):
                  print(f"{plugin.path / 'config.json'}:required_binaries")
          PY
          )
          test "${#SNAPSHOT_CONFIGS[@]}" -gt 0
          DEPS_FROM_ARGS=()
          for config in "${SNAPSHOT_CONFIGS[@]}"; do
            DEPS_FROM_ARGS+=("--deps-from=$config")
          done
          snapshot_env="$(
            "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$ABXPKG_LIB_DIR" \
              "${DEPS_FROM_ARGS[@]}"
          )"
          "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            <<< "$snapshot_env" >> "$GITHUB_ENV"

          "$UV_BINARY" run --no-sync --no-sources python - <<'PY'
          import os
          from pathlib import Path
          from abx_dl.models import discover_plugins

          plugins = discover_plugins(Path(os.environ["ABX_PLUGINS_DIR"]), runtime="abx-dl")
          enabled_keys = sorted(
              plugin.enabled_key
              for plugin in plugins.values()
              if plugin.filter_hooks("Snapshot") and plugin.enabled_key in plugin.config.properties
          )
          with Path(os.environ["GITHUB_ENV"]).open("a") as output:
              for enabled_key in enabled_keys:
                  output.write(f"{enabled_key}=True\n")
          print(f"Enabled {len(enabled_keys)} Snapshot plugins: {enabled_keys}")
          PY

          for binary in chromium node java opendataloader-pdf; do
            test -L "$ABXPKG_LIB_DIR/env/bin/$binary"
            test -x "$ABXPKG_LIB_DIR/env/bin/$binary"
          done

      - name: Verify Chromium launch
        uses: ./.github/actions/verify-chromium-launch

      - name: Test all plugins
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" run --no-sync --no-sources abx-dl dl 'https://example.com' --dir=./test-output --max-urls=2
          "${UV_BINARY}" run --no-sync --no-sources python bin/validate_crawl.py \
            ./test-output/index.jsonl \
            --output-dir=./test-output \
            --plugins-dir="${{ runner.temp }}/abx-plugins/abx_plugins/plugins"
        env:
          ABX_PLUGINS_DIR: ${{ runner.temp }}/abx-plugins/abx_plugins/plugins
          PERSONAS_DIR: ${{ runner.temp }}/abx-personas
          CHROME_USER_DATA_DIR: ${{ runner.temp }}/abx-personas/Default/chrome_profile

      - name: Upload test output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-output
          path: ./test-output/
          retention-days: 7

  package-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install build and test dependencies
        run: $UV_BINARY sync --locked --dev --no-sources

      - name: Build wheel and source distribution once
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" build --out-dir=dist
          "${UV_BINARY}" run --no-sync --no-sources python - <<'PY'
          import hashlib
          from pathlib import Path

          artifacts = sorted(Path("dist").iterdir())
          wheels = [path for path in artifacts if path.suffix == ".whl"]
          sdists = [path for path in artifacts if path.name.endswith(".tar.gz")]
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(f"Expected one wheel and one sdist, got: {artifacts}")
          checksums = [f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}" for path in (*wheels, *sdists)]
          Path("dist/SHA256SUMS").write_text("\n".join(checksums) + "\n")
          print("\n".join(checksums))
          PY

      - name: Upload the exact tested distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 90

  package-artifact-smoke:
    name: Test release artifacts (Python ${{ matrix.python }})
    needs: package-artifacts
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host CI tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Download the exact release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-dist-${{ github.sha }}
          path: dist

      - name: Install and smoke-test the exact wheel and sdist
        run: |
          set -Eeuo pipefail
          VERSION="$("${UV_BINARY}" run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          for artifact in dist/*.whl dist/*.tar.gz; do
            test "$("${UV_BINARY}" run --isolated --no-project --python '${{ matrix.python }}' --with "$artifact" abx-dl version --quiet)" = "$VERSION"
            "${UV_BINARY}" run --isolated --no-project --python '${{ matrix.python }}' --with "$artifact" abx-dl --help > /dev/null
          done
