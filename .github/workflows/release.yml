name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: archivebox/abx-dl
  GHCR_IMAGE: ghcr.io/archivebox/abx-dl
  RELEASE_BRANCH: main
  RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
  CI_RUN_ID: ${{ github.event.workflow_run.id }}

jobs:
  python-release:
    name: Publish tested Python artifacts
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-24.04
    environment: pypi

    steps:
      - name: Checkout the tested commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host release tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Publish the exact tested distributions
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: ./bin/release.sh

  docker-release:
    name: Publish tested multiarch image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    needs: python-release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the tested commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 1
          ref: ${{ env.RELEASE_SHA }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.6"

      - name: Project host release tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py orchestration_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Resolve Docker through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" run --no-project python bin/ci_project_tools.py docker_binaries --lib "$ABXPKG_LIB_DIR"
          docker_binary="$ABXPKG_LIB_DIR/env/bin/docker"
          test -L "$docker_binary"
          test -x "$docker_binary"
          "$docker_binary" --version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.31.2

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download exact tested image digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.CI_RUN_ID }}

      - name: Collect release tags
        id: docker_meta
        shell: bash
        run: |
          set -Eeuo pipefail
          VERSION="$("${UV_BINARY}" run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          SHORT_SHA="${RELEASE_SHA::12}"
          TAG="v${VERSION}"
          tag_output="$("${GIT_BINARY}" ls-remote origin "refs/tags/${TAG}^{}")"
          tag_target="${tag_output%%[[:space:]]*}"
          if [[ -z "$tag_target" ]]; then
            tag_output="$("${GIT_BINARY}" ls-remote origin "refs/tags/${TAG}")"
            tag_target="${tag_output%%[[:space:]]*}"
          fi

          {
            echo 'dockerhub_tags<<EOF'
            if [[ "$VERSION" != *rc* ]]; then
              echo "${DOCKERHUB_IMAGE}:latest"
            fi
            echo "${DOCKERHUB_IMAGE}:main"
            echo "${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            if [[ "$tag_target" == "$RELEASE_SHA" ]]; then
              echo "${DOCKERHUB_IMAGE}:${VERSION}"
            fi
            echo 'EOF'
            echo 'ghcr_tags<<EOF'
            if [[ "$VERSION" != *rc* ]]; then
              echo "${GHCR_IMAGE}:latest"
            fi
            echo "${GHCR_IMAGE}:main"
            echo "${GHCR_IMAGE}:sha-${SHORT_SHA}"
            if [[ "$tag_target" == "$RELEASE_SHA" ]]; then
              echo "${GHCR_IMAGE}:${VERSION}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Verify digest set
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t DIGESTS < <("${UV_BINARY}" run --no-project python -c 'from pathlib import Path; print("\n".join(sorted(path.name for path in Path("/tmp/digests").iterdir() if path.is_file())))')
          [[ "${#DIGESTS[@]}" -eq 2 ]]
          for digest in "${DIGESTS[@]}"; do
            [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          done

      - name: Create Docker Hub manifest
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t DIGESTS < <("${UV_BINARY}" run --no-project python -c 'from pathlib import Path; print("\n".join(sorted(path.name for path in Path("/tmp/digests").iterdir() if path.is_file())))')
          TAG_ARGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.docker_meta.outputs.dockerhub_tags }}"
          REFS=()
          for digest in "${DIGESTS[@]}"; do
            REFS+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done
          "${DOCKER_BINARY}" buildx imagetools create "${TAG_ARGS[@]}" "${REFS[@]}"

      - name: Create GHCR manifest
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t DIGESTS < <("${UV_BINARY}" run --no-project python -c 'from pathlib import Path; print("\n".join(sorted(path.name for path in Path("/tmp/digests").iterdir() if path.is_file())))')
          TAG_ARGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.docker_meta.outputs.ghcr_tags }}"
          REFS=()
          for digest in "${DIGESTS[@]}"; do
            REFS+=("${GHCR_IMAGE}@sha256:${digest}")
          done
          "${DOCKER_BINARY}" buildx imagetools create "${TAG_ARGS[@]}" "${REFS[@]}"
